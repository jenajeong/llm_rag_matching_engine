<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>INDIGO 교수 추천 검색</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14233c;
      --muted: #69778d;
      --line: #d9e2ef;
      --surface: #ffffff;
      --soft: #f4f8fd;
      --brand: #005bac;
      --brand-dark: #003f87;
      --brand-light: #e7f2ff;
      --accent: #00a6b2;
      --warning: #f26b21;
      --shadow: 18px 22px 30px rgba(23, 31, 44, 0.08);
      --soft-shadow: 10px 14px 24px rgba(23, 31, 44, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      color: var(--ink);
      background: #ffffff;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      display: block;
    }

    .search-panel {
      background: #ffffff;
      border-bottom: 1px solid #f1f1f1;
      padding: 0 clamp(18px, 4vw, 56px) 38px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      max-width: 1550px;
      min-height: 102px;
      margin: 0 auto 16px;
    }

    .inu-logo {
      width: 124px;
      height: 70px;
      flex: 0 0 auto;
      display: block;
      object-fit: contain;
      object-position: center;
    }

    .brand-mark {
      width: 116px;
      height: 50px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: var(--brand-dark);
      font-size: 31px;
      font-weight: 900;
      letter-spacing: -1px;
      position: relative;
      flex: 0 0 auto;
    }

    .brand-mark::after {
      content: "";
      width: 28px;
      height: 28px;
      border: 7px solid #ffae16;
      border-left-color: transparent;
      border-bottom-color: transparent;
      border-radius: 50%;
      position: absolute;
      right: -4px;
      top: 2px;
    }

    .brand strong {
      display: block;
      font-size: 24px;
      line-height: 1.25;
      color: #3a3a3a;
      word-break: keep-all;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
      word-break: keep-all;
    }

    .field {
      display: grid;
      gap: 9px;
      margin-bottom: 0;
      position: relative;
    }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #213b62;
    }

    #searchForm {
      max-width: 1550px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(280px, 625px) 68px auto;
      justify-content: center;
      gap: 13px;
      align-items: center;
      background: #f2f2f2;
      border: 0;
      border-radius: 11px;
      box-shadow: none;
      padding: 48px 52px;
    }

    .query-field {
      grid-column: 1;
    }

    .doc-field {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 90px minmax(0, 670px);
      align-items: center;
      justify-content: center;
      gap: 22px;
      margin-top: 18px;
    }

    .doc-field > label,
    .query-field > label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .doc-field::before {
      content: "검색 문서";
      font-size: 20px;
      font-weight: 800;
      color: #2f2f2f;
      text-align: right;
    }

    .query-input {
      width: 100%;
      height: 68px;
      min-height: 68px;
      resize: none;
      border: 1px solid #d8d8d8;
      border-radius: 5px;
      padding: 0 16px;
      color: var(--ink);
      background: #ffffff;
      line-height: 68px;
      font-size: 20px;
      overflow: hidden;
    }

    .query-input::placeholder {
      color: #a9a9a9;
    }

    .query-input:focus,
    .expand-search-button:focus-visible {
      outline: 3px solid rgba(0, 91, 172, 0.16);
      border-color: var(--brand);
      background: #fff;
    }

    .type-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .type-options label {
      border: 1px solid #d9d9d9;
      border-radius: 999px;
      min-height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #ffffff;
      color: #3a3a3a;
      font-size: 17px;
      cursor: pointer;
      user-select: none;
      padding: 0 18px;
    }

    .type-options input {
      accent-color: var(--brand);
    }

    .primary-button,
    .reset-button,
    .secondary-button {
      width: 100%;
      min-height: 68px;
      border: 0;
      border-radius: 7px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
    }

    .primary-button {
      width: 68px;
      background: #666666;
      color: #fff;
      box-shadow: none;
      font-size: 0;
      position: relative;
    }

    .primary-button::before {
      content: "";
      width: 20px;
      height: 20px;
      border: 3px solid #ffffff;
      border-radius: 50%;
      position: absolute;
      top: 20px;
      left: 19px;
    }

    .primary-button::after {
      content: "";
      width: 16px;
      height: 3px;
      background: #ffffff;
      border-radius: 999px;
      transform: rotate(45deg);
      position: absolute;
      top: 42px;
      left: 39px;
    }

    .primary-button:hover {
      background: #555555;
    }

    .reset-button {
      width: 122px;
      color: #2f2f2f;
      background: transparent;
      box-shadow: none;
      font-size: 19px;
      gap: 10px;
      padding: 0;
      justify-content: flex-start;
    }

    .reset-button::before {
      content: "";
      width: 18px;
      height: 18px;
      border: 3px solid #2f2f2f;
      border-right-color: transparent;
      border-radius: 50%;
      display: inline-block;
    }

    .primary-button:disabled,
    .reset-button:disabled,
    .secondary-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #searchForm .status {
      grid-column: 1 / -1;
    }

    .status.error {
      color: #c0351b;
      font-weight: 700;
    }

    .notice-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(55, 55, 55, 0.42);
      backdrop-filter: blur(2px);
    }

    .notice-overlay.is-active {
      display: flex;
    }

    .notice-card {
      width: min(360px, 100%);
      min-height: 178px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 18px 22px 36px rgba(0, 0, 0, 0.16);
      display: grid;
      place-items: center;
      gap: 16px;
      padding: 30px 28px;
      text-align: center;
    }

    .notice-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #e8edf4;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: notice-spin 0.9s linear infinite;
    }

    .notice-overlay:not(.is-busy) .notice-spinner {
      animation: none;
      border-color: var(--brand);
      position: relative;
    }

    .notice-overlay:not(.is-busy) .notice-spinner::after {
      content: "";
      width: 19px;
      height: 10px;
      border-left: 4px solid var(--brand);
      border-bottom: 4px solid var(--brand);
      transform: rotate(-45deg);
      position: absolute;
      top: 14px;
      left: 11px;
    }

    .notice-overlay.is-error .notice-spinner {
      border-color: #c0351b;
    }

    .notice-overlay.is-error .notice-spinner::before,
    .notice-overlay.is-error .notice-spinner::after {
      content: "";
      width: 22px;
      height: 4px;
      background: #c0351b;
      border: 0;
      border-radius: 999px;
      position: absolute;
      top: 17px;
      left: 8px;
    }

    .notice-overlay.is-error .notice-spinner::before {
      transform: rotate(45deg);
    }

    .notice-overlay.is-error .notice-spinner::after {
      transform: rotate(-45deg);
    }

    .notice-message {
      color: #202020;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.45;
      word-break: keep-all;
    }

    @keyframes notice-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .results-panel {
      max-width: 1550px;
      margin: 0 auto;
      padding: 38px clamp(18px, 4vw, 40px) 60px;
    }

    .results-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 2.4vw, 34px);
      line-height: 1.2;
      color: #1e1e1e;
    }

    .summary {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .secondary-button {
      max-width: 190px;
      min-height: 42px;
      border: 1px solid #ffd6df;
      color: var(--brand-dark);
      background: #fff4f7;
      box-shadow: none;
      flex: 0 0 auto;
      border-radius: 7px;
    }

    .empty {
      min-height: 420px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: var(--shadow);
      color: var(--muted);
      text-align: center;
      padding: 28px;
      line-height: 1.7;
    }

    .result-list {
      display: grid;
      gap: 24px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .pagination[hidden] {
      display: none;
    }

    .pagination-button {
      min-width: 44px;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid #d9d9d9;
      border-radius: 7px;
      background: #ffffff;
      color: #42526a;
      cursor: pointer;
      font-size: 14px;
      font-weight: 800;
    }

    .pagination-button:hover:not(:disabled) {
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .pagination-button:disabled {
      cursor: default;
      opacity: 0.42;
    }

    .pagination-status {
      min-width: 52px;
      color: #42526a;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .expand-search {
      margin-top: 32px;
      padding: 28px;
      border: 1px solid #e4e8ed;
      border-radius: 16px;
      background: #f7f9fc;
      text-align: center;
    }

    .expand-search[hidden] {
      display: none;
    }

    .expand-search p {
      margin: 0 0 12px;
      color: #42526a;
      font-size: 16px;
      font-weight: 700;
    }

    .expand-search-button {
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid var(--brand);
      border-radius: 7px;
      background: #ffffff;
      color: var(--brand-dark);
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
    }

    .expand-search-button:hover {
      background: #eaf4ff;
    }

    .professor-card {
      background: var(--surface);
      border: 0;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 42px 52px;
      position: relative;
      overflow: hidden;
    }

    .professor-card::after {
      content: "추천교수";
      min-width: 106px;
      height: 41px;
      padding: 0 16px;
      border-radius: 7px;
      background: #ffe2e9;
      color: #e32255;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      position: absolute;
      top: 0;
      right: 0;
    }

    .card-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      margin-bottom: 22px;
      padding-right: 94px;
    }

    .rank-name {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .rank {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: #d0d0d0;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .professor-name {
      font-size: 28px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .meta {
      margin-top: 20px;
      color: #42526a;
      font-size: 20px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .documents {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .document {
      border-top: 1px solid #eeeeee;
      padding-top: 14px;
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 16px;
      color: #2b3645;
      line-height: 1.55;
      font-size: 16px;
    }

    .doc-type {
      color: var(--brand-dark);
      font-weight: 800;
    }

    .doc-title {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .doc-detail {
      color: var(--muted);
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    @media (max-width: 920px) {
      #searchForm {
        grid-template-columns: 1fr;
      }

      .query-field,
      .doc-field {
        grid-column: 1;
      }

      .doc-field {
        grid-template-columns: 1fr;
        justify-content: stretch;
      }

      .doc-field::before {
        text-align: left;
        font-size: 16px;
      }

      .primary-button {
        width: 100%;
      }

      .reset-button {
        width: 100%;
        justify-content: center;
      }

      .primary-button::before {
        left: calc(50% - 18px);
      }

      .primary-button::after {
        left: calc(50% + 2px);
      }

      .results-head {
        align-items: stretch;
        flex-direction: column;
      }

      .secondary-button {
        max-width: none;
      }
    }

    @media (max-width: 560px) {
      .search-panel,
      .results-panel {
        padding: 24px 16px;
      }

      .type-options {
        grid-template-columns: 1fr;
      }

      #searchForm {
        padding: 28px 18px;
      }

      .brand {
        min-height: 82px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .brand-mark {
        width: 98px;
        font-size: 27px;
      }

      .inu-logo {
        width: 98px;
        height: 56px;
      }

      .professor-card {
        padding: 34px 24px;
      }

      .card-top {
        grid-template-columns: 1fr;
        padding-right: 0;
      }

      .document {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        <div class="brand-mark">INDig</div>
        <div>
          <strong>INU산학매칭지원</strong>
          <span>INu DIGital innOvation platform</span>
        </div>
      </div>

      <form id="searchForm">
        <div class="field query-field">
          <label for="query">검색어</label>
          <input class="query-input" id="query" name="query" type="text" placeholder="검색어 입력" required>
        </div>

        <button class="primary-button" id="searchButton" type="submit">검색</button>
        <button class="reset-button" id="resetButton" type="button">초기화</button>

        <div class="field doc-field">
          <label>검색 문서</label>
          <div class="type-options">
            <label><input type="checkbox" name="doc_types" value="article" checked> #논문</label>
            <label><input type="checkbox" name="doc_types" value="patent" checked> #특허</label>
            <label><input type="checkbox" name="doc_types" value="project" checked> #과제</label>
          </div>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>
      </form>
    </section>

    <section class="results-panel" aria-label="검색 결과">
      <div class="results-head">
        <div>
          <h1>추천 결과</h1>
          <p class="summary" id="summary">검색어를 입력하면 관련 교수 상위 결과가 표시됩니다.</p>
        </div>
        <button class="secondary-button" id="reportButton" type="button" disabled>PDF 보고서</button>
      </div>

      <div id="results" class="empty">아직 검색 결과가 없습니다.</div>
      <nav class="pagination" id="pagination" aria-label="추천 교수 페이지 이동" hidden>
        <button class="pagination-button" id="previousPageButton" type="button">이전</button>
        <span class="pagination-status" id="paginationStatus"></span>
        <button class="pagination-button" id="nextPageButton" type="button">다음</button>
      </nav>
      <div class="expand-search" id="expandSearch" hidden>
        <p>원하는 교수를 찾지 못하셨나요?</p>
        <button class="expand-search-button" id="expandSearchButton" type="button">검색 범위를 넓혀 다시 검색</button>
      </div>
    </section>
  </main>

  <div class="notice-overlay" id="noticeOverlay" role="alert" aria-live="assertive" aria-hidden="true">
    <div class="notice-card">
      <div class="notice-spinner" aria-hidden="true"></div>
      <div class="notice-message" id="noticeMessage"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById("searchForm");
    const queryInput = document.getElementById("query");
    const searchButton = document.getElementById("searchButton");
    const resetButton = document.getElementById("resetButton");
    const expandSearch = document.getElementById("expandSearch");
    const expandSearchButton = document.getElementById("expandSearchButton");
    const pagination = document.getElementById("pagination");
    const previousPageButton = document.getElementById("previousPageButton");
    const nextPageButton = document.getElementById("nextPageButton");
    const paginationStatus = document.getElementById("paginationStatus");
    const reportButton = document.getElementById("reportButton");
    const statusEl = document.getElementById("status");
    const noticeOverlay = document.getElementById("noticeOverlay");
    const noticeMessage = document.getElementById("noticeMessage");
    const summaryEl = document.getElementById("summary");
    const resultsEl = document.getElementById("results");
    const RESULT_PROFESSOR_COUNT = 10;
    const PROFESSORS_PER_PAGE = 5;
    const DEFAULT_RETRIEVAL_TOP_K = 20;
    const EXPANDED_RETRIEVAL_TOP_K = 30;
    let currentSearchId = "";
    let expandedSearchEnabled = false;
    let currentPage = 1;
    let currentRankedProfessors = [];
    let noticeTimer = null;
    let cachedReport = null;

    function defaultSummary() {
      return `검색어를 입력하면 관련 교수 상위 ${RESULT_PROFESSOR_COUNT}명을 확인할 수 있습니다.`;
    }

    summaryEl.textContent = defaultSummary();

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function hideNotice() {
      window.clearTimeout(noticeTimer);
      noticeOverlay.classList.remove("is-active", "is-busy", "is-error");
      noticeOverlay.setAttribute("aria-hidden", "true");
    }

    function showNotice(message, options = {}) {
      const { busy = false, error = false, autoHide = 0 } = options;
      window.clearTimeout(noticeTimer);
      setStatus(message, error);
      noticeMessage.textContent = message;
      noticeOverlay.classList.toggle("is-busy", busy);
      noticeOverlay.classList.toggle("is-error", error);
      noticeOverlay.classList.add("is-active");
      noticeOverlay.setAttribute("aria-hidden", "false");

      if (autoHide > 0) {
        noticeTimer = window.setTimeout(hideNotice, autoHide);
      }
    }

    function clearCachedReport() {
      if (cachedReport?.url) {
        URL.revokeObjectURL(cachedReport.url);
      }
      cachedReport = null;
    }

    function downloadBlobUrl(url, filename) {
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function docTypeLabel(type) {
      return { article: "논문", patent: "특허", project: "과제" }[type] || type;
    }

    function collectDocuments(professor) {
      const documents = professor.documents || {};
      return ["article", "patent", "project"].flatMap((type) => {
        return (documents[type] || []).slice(0, 3).map((doc) => ({
          type,
          title: doc.title || doc.name || doc.THSS_NM || doc.tech_nm || "제목 없음",
          year: doc.year || doc.PBLC_YY || doc.APPL_DT || doc.RSCH_STT_YY || "",
        }));
      }).slice(0, 6);
    }

    function renderCurrentPage() {
      if (!currentRankedProfessors.length) {
        resultsEl.className = "empty";
        resultsEl.textContent = "조건에 맞는 추천 결과가 없습니다.";
        pagination.hidden = true;
        return;
      }

      const pageCount = Math.ceil(currentRankedProfessors.length / PROFESSORS_PER_PAGE);
      currentPage = Math.min(currentPage, pageCount);
      const pageStart = (currentPage - 1) * PROFESSORS_PER_PAGE;
      const pageProfessors = currentRankedProfessors.slice(pageStart, pageStart + PROFESSORS_PER_PAGE);

      resultsEl.className = "result-list";
      resultsEl.innerHTML = pageProfessors.map((professor) => {
        const info = professor.professor_info || {};
        const name = info.NM || info.name || "이름 없음";
        const department = [info.COLG_NM, info.HG_NM, info.WKGD_NM].filter(Boolean).join(" · ");
        const email = info.EMAIL || "";
        const docs = collectDocuments(professor);

        return `
          <article class="professor-card">
            <div class="card-top">
              <div>
                <div class="rank-name">
                  <div class="rank">${escapeHtml(professor.rank || "")}</div>
                  <div>
                    <div class="professor-name">${escapeHtml(name)}</div>
                    <div class="meta">${escapeHtml(department || "소속 정보 없음")}${email ? " · " + escapeHtml(email) : ""}</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="documents">
              ${docs.length ? docs.map((doc) => `
                <div class="document">
                  <div class="doc-type">${escapeHtml(docTypeLabel(doc.type))}</div>
                  <div>
                    <div class="doc-title">${escapeHtml(doc.title)}</div>
                    <div class="doc-detail">${escapeHtml([doc.year].filter(Boolean).join(" · "))}</div>
                  </div>
                </div>
              `).join("") : `<div class="document"><div class="doc-type">근거</div><div class="doc-detail">표시할 문서 정보가 없습니다.</div></div>`}
            </div>
          </article>
        `;
      }).join("");

      pagination.hidden = pageCount <= 1;
      paginationStatus.textContent = `${currentPage} / ${pageCount}`;
      previousPageButton.disabled = currentPage === 1;
      nextPageButton.disabled = currentPage === pageCount;
    }

    function renderResults(data) {
      const ranked = data?.ahp_results?.ranked_professors || [];
      currentSearchId = data.search_id || "";
      currentPage = 1;
      currentRankedProfessors = ranked.slice(0, RESULT_PROFESSOR_COUNT);
      reportButton.disabled = !currentSearchId;
      expandSearch.hidden = expandedSearchEnabled;
      summaryEl.textContent = `"${data.query || queryInput.value}" 검색 결과 ${ranked.length.toLocaleString("ko-KR")}명 중 상위 ${currentRankedProfessors.length.toLocaleString("ko-KR")}명을 ${PROFESSORS_PER_PAGE}명씩 나누어 표시합니다.`;
      renderCurrentPage();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) {
        showNotice("검색어를 입력해 주세요.", { error: true, autoHide: 1600 });
        queryInput.focus();
        return;
      }

      const docTypes = Array.from(document.querySelectorAll('input[name="doc_types"]:checked')).map((item) => item.value);
      if (!docTypes.length) {
        showNotice("검색 문서를 하나 이상 선택해 주세요.", { error: true, autoHide: 1800 });
        return;
      }

      const payload = {
        query,
        doc_types: docTypes,
        retrieval_top_k: expandedSearchEnabled
          ? EXPANDED_RETRIEVAL_TOP_K
          : DEFAULT_RETRIEVAL_TOP_K,
      };

      currentSearchId = "";
      currentPage = 1;
      currentRankedProfessors = [];
      clearCachedReport();
      expandSearch.hidden = true;
      pagination.hidden = true;
      reportButton.disabled = true;
      searchButton.disabled = true;
      showNotice("검색 중입니다. 잠시만 기다려 주세요.", { busy: true });

      try {
        const response = await fetch(window.location.pathname || "/api/v1/search/recommend", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "검색 요청에 실패했습니다.");
        }
        renderResults(data);
        showNotice("검색이 완료되었습니다.", { autoHide: 1200 });
      } catch (error) {
        resultsEl.className = "empty";
        resultsEl.textContent = "검색 결과를 불러오지 못했습니다.";
        showNotice(error.message, { error: true, autoHide: 2200 });
      } finally {
        searchButton.disabled = false;
      }
    });

    queryInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.isComposing) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    queryInput.addEventListener("input", () => {
      expandedSearchEnabled = false;
      expandSearch.hidden = true;
    });

    queryInput.addEventListener("paste", (event) => {
      const pastedText = event.clipboardData?.getData("text") || "";
      if (!/[\r\n]/.test(pastedText)) {
        return;
      }

      event.preventDefault();
      const sanitizedText = pastedText.replace(/\s*[\r\n]+\s*/g, " ");
      queryInput.setRangeText(
        sanitizedText,
        queryInput.selectionStart,
        queryInput.selectionEnd,
        "end",
      );
    });

    expandSearchButton.addEventListener("click", () => {
      expandedSearchEnabled = true;
      expandSearch.hidden = true;
      form.requestSubmit();
    });

    previousPageButton.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage -= 1;
        renderCurrentPage();
      }
    });

    nextPageButton.addEventListener("click", () => {
      const pageCount = Math.ceil(currentRankedProfessors.length / PROFESSORS_PER_PAGE);
      if (currentPage < pageCount) {
        currentPage += 1;
        renderCurrentPage();
      }
    });

    document.querySelectorAll('input[name="doc_types"]').forEach((checkbox) => {
      checkbox.addEventListener("change", () => {
        expandedSearchEnabled = false;
        expandSearch.hidden = true;
      });
    });

    resetButton.addEventListener("click", () => {
      form.reset();
      expandedSearchEnabled = false;
      expandSearch.hidden = true;
      currentSearchId = "";
      currentPage = 1;
      currentRankedProfessors = [];
      clearCachedReport();
      pagination.hidden = true;
      reportButton.disabled = true;
      summaryEl.textContent = defaultSummary();
      resultsEl.className = "empty";
      resultsEl.textContent = "아직 검색 결과가 없습니다.";
      setStatus("");
      hideNotice();
      queryInput.focus();
    });

    reportButton.addEventListener("click", async () => {
      if (!currentSearchId) {
        return;
      }

      if (cachedReport?.searchId === currentSearchId) {
        downloadBlobUrl(cachedReport.url, cachedReport.filename);
        showNotice("저장된 PDF 보고서를 내려받습니다.", { autoHide: 1000 });
        return;
      }

      reportButton.disabled = true;
      showNotice("PDF 보고서를 생성하고 있습니다.", { busy: true });

      try {
        const response = await fetch("/api/v1/report/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            search_id: currentSearchId,
            professor_count: RESULT_PROFESSOR_COUNT,
          }),
        });
        if (!response.ok) {
          let detail = "보고서 생성에 실패했습니다.";
          try {
            const data = await response.json();
            detail = data.detail || detail;
          } catch (error) {}
          throw new Error(detail);
        }

        const blob = await response.blob();
        const filenameHeader = response.headers.get("Content-Disposition") || "";
        const filenameMatch = filenameHeader.match(/filename="?([^"]+)"?/);
        const filename = filenameMatch ? filenameMatch[1] : "indigo_report.pdf";
        clearCachedReport();
        const url = URL.createObjectURL(blob);
        cachedReport = {
          searchId: currentSearchId,
          url,
          filename,
        };
        downloadBlobUrl(url, filename);
        showNotice("PDF 보고서가 생성되었습니다.", { autoHide: 1300 });
      } catch (error) {
        showNotice(error.message, { error: true, autoHide: 2400 });
      } finally {
        reportButton.disabled = !currentSearchId;
      }
    });

    window.addEventListener("beforeunload", clearCachedReport);
  </script>
</body>
</html>
