version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search_api
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/staticfiles
      - model_cache:/root/.cache/huggingface    # Qwen 모델 캐시
      - /indigo/history:/app/history
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app_network

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - api
    networks:
      - app_network

volumes:
  static_volume:
  model_cache:        # Qwen 모델 다운로드 캐시 유지

networks:
  app_network:
    driver: bridge