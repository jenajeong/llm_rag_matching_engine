services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - static_volume:/app/staticfiles
      - model_cache:/root/.cache/huggingface
      - /indigo/history:/app/history
      - /indigo/search-api/llm_rag_matching_api/data:/app/data
    expose:
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - app_network

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indigo_pipeline
    restart: "no"          # 스케줄러가 직접 실행/종료 관리
    env_file:
      - .env
    environment:
      - CUDA_VISIBLE_DEVICES=0,1  # GPU 전체 사용 (API 중단 중)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - model_cache:/root/.cache/huggingface
      - /indigo/search-api/llm_rag_matching_api/data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    command: ["/bin/bash", "/app/pipeline_entrypoint.sh"]
    profiles:
      - pipeline    # 기본 up에서는 제외, 명시적으로만 실행
    networks:
      - app_network

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

volumes:
  static_volume:
  model_cache:

networks:
  app_network:
    driver: bridge